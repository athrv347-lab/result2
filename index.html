<!DOCTYPE html>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background: url("result-bg.jpg") no-repeat center center fixed;
    background-size: cover;
    height:100vh;
    display:flex;

/* Dark overlay */
body::before{
    content:"";

    left:0;

    height:100%;

.card{

    width:500px;

    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    z-index:1;
}
body{
    background:url("logo1.png") center/cover no-repeat;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
h2{
    color:#8d1d1d;
    margin-bottom:20px;
}

p{
    font-size:20px;
    margin:15px 0;
}

a{
    display:inline-block;
    margin-top:25px;
    padding:12px 30px;
    background:#8d1d1d;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

a:hover{
    background:#6b1111;
}

</style>
</head>
