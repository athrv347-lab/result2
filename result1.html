<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Result Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:url("logo.png") center/cover no-repeat;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.3);
}

.container{
    position:relative;
    width:420px;
    background:#fff;
    padding:40px;
    text-align:center;
    z-index:2;
}

.logo{
    width:90px;
    margin-bottom:15px;
}

h1{
    color:#7b1d1d;
    margin-bottom:30px;
    font-weight:500;
}

input{
    width:100%;
    padding:15px;
    font-size:16px;
    margin-bottom:25px;
    border:1px solid #ccc;
}

button{
    background:#8d1d1d;
    color:white;
    border:none;
    padding:14px 40px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#6b1111;
}

.footer{
    margin-top:30px;
    font-size:13px;
    color:#555;
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

<img src="image.png" class="logo">

<h1>Student OneView</h1>

<form action="result.html">
<input
type="text"
placeholder="Enter Roll Number"
required>

<button type="submit">CHECK RESULT</button>
</form>

<div class="footer">
Result Portal Demo
</div>

</div>

</body>
</html>
